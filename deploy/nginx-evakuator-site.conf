server {
    listen 80;
    listen [::]:80;
    server_name evacuatordon.ru www.evacuatordon.ru 194.55.236.121 _;

    root /var/www/evakuator-site;
    index index.html;

    access_log /var/log/nginx/evakuator-site.access.log;
    error_log /var/log/nginx/evakuator-site.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
